    <style>
        :root {
            --bg-color: #fdfaf7;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent: #e67e22;
            --success: #27ae60;
            --strike: #e74c3c;
            --border-radius: 12px;
            --nav-bg: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 3rem;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            width: 100%;
            background-color: var(--card-bg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            padding: 1.5rem 1rem 1rem 1rem;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .progress-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 22px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            font-size: 13px;
            line-height: 22px;
            color: #333;
            pointer-events: none;
        }

        nav {
            background-color: var(--nav-bg);
            display: flex;
            justify-content: flex-start;
            overflow-x: auto;
            padding: 0 1rem;
            scrollbar-width: none;
        }
        
        @media (min-width: 900px) {
            nav {
                justify-content: center;
            }
        }

        nav::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #ecf0f1;
            padding: 1rem 1.2rem;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            border-bottom: 4px solid transparent;
        }

        .nav-btn:hover {
            background-color: #34495e;
        }

        .nav-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background-color: #34495e;
        }

        .list-container {
            width: 95%;
            max-width: 1200px;
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 1.5rem;
            align-items: start; 
        }

        @media (max-width: 768px) {
            .list-container {
                grid-template-columns: 1fr;
            }
        }

        .topic-group {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eaeaea;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topic-header {
            padding: 1rem 1.5rem;
            background-color: #fdf8f5;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid #eaeaea;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .topic-header:hover {
            background-color: #faebd7;
        }

        .subtopics {
            display: flex;
            flex-direction: column;
        }

        .item {
            padding: 0.8rem 1.5rem 0.8rem 3rem;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item:hover {
            background-color: #fafbfc;
        }

        .check-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #bdc3c7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .completed > .check-circle {
            background-color: var(--success);
            border-color: var(--success);
        }

        .completed > .check-circle::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .completed > .text-content {
            text-decoration: line-through;
            text-decoration-color: var(--strike);
            text-decoration-thickness: 2px;
            color: var(--text-muted);
            opacity: 0.8;
        }
        
        .text-content {
            transition: all 0.3s ease;
            flex-grow: 1;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            margin-left: auto;
            border-radius: 6px;
            color: #95a5a6;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #f0e6d2;
            color: var(--accent);
        }

        .copy-btn.copied {
            color: var(--success);
        }
        
        .icon-svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

                        children: [

                            { id: "T7_A2", title: "Peso y fuerza gravitacional" },
                            { id: "T7_A3", title: "Los sistemas planetarios y las Leyes de Kepler" },
                            { id: "T7_A4", title: "Impulso angular, Segunda Ley de Kepler, Ley de gravedad y mov. de los planetas" }
                        ]
                    },
                    {
                        id: "T7_B", 
                        title: "🌌 Campo y Energía Gravitatoria",
                        children: [
                            { id: "T7_B1", title: "El campo gravitatorio" },
                            { id: "T7_B2", title: "Energía y potencial gravitatorio" },

                ]

            let estado = JSON.parse(localStorage.getItem("progresoFisicaOficialApp2")) || {};
            let temaActivo = "1";

            const container = document.getElementById('listContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const navButtons = document.querySelectorAll('.nav-btn');

            const svgCopy = `<svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
            const svgCheck = `<svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

            navButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    navButtons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    temaActivo = e.target.dataset.tema;
                    renderizarLista();
                });
            });

            function renderizarLista() {
                container.innerHTML = '';
                const temasMostrados = data[temaActivo];

                temasMostrados.forEach(grupo => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'topic-group';

                    const textoBloque = `${grupo.title}\n` + grupo.children.map(c => `- ${c.title}`).join('\n') + '\n\nEnseñame todo esto';

                    const headerDiv = document.createElement('div');
                    headerDiv.className = `topic-header ${estado[grupo.id] ? 'completed' : ''}`;
                    headerDiv.innerHTML = `
                        <div class="check-circle"></div>
                        <div class="text-content">${grupo.title}</div>
                        <button class="copy-btn" title="Copiar bloque de temas">${svgCopy}</button>
                    `;
                    
                    headerDiv.addEventListener('click', (e) => {
                        if(e.target.closest('.copy-btn')) return;
                        togglePadre(grupo.id, grupo.children);
                    });

                    const copyBtnPadre = headerDiv.querySelector('.copy-btn');
                    copyBtnPadre.addEventListener('click', (e) => manejarCopia(e, copyBtnPadre, textoBloque));

                    groupDiv.appendChild(headerDiv);

                    const subtopicsDiv = document.createElement('div');
                    subtopicsDiv.className = 'subtopics';

                    grupo.children.forEach(hijo => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = `item ${estado[hijo.id] ? 'completed' : ''}`;
                        itemDiv.innerHTML = `
                            <div class="check-circle"></div>
                            <div class="text-content">${hijo.title}</div>
                        `;

                        itemDiv.addEventListener('click', () => {
                            toggleHijo(hijo.id, grupo.id, grupo.children);
                        });

                        subtopicsDiv.appendChild(itemDiv);
                    });

                    groupDiv.appendChild(subtopicsDiv);
                    container.appendChild(groupDiv);
                });

                actualizarProgresoPorTema();
            }

            function manejarCopia(e, btnElement, texto) {
                e.stopPropagation();
                navigator.clipboard.writeText(texto).then(() => {
                    btnElement.innerHTML = svgCheck;
                    btnElement.classList.add('copied');
                    setTimeout(() => {
                        btnElement.innerHTML = svgCopy;
                        btnElement.classList.remove('copied');
                    }, 1500);
                }).catch(err => console.error('Error al copiar: ', err));
            }

            function togglePadre(idPadre, hijos) {
                const nuevoEstado = !estado[idPadre];
                estado[idPadre] = nuevoEstado;
                hijos.forEach(hijo => estado[hijo.id] = nuevoEstado);
                guardarYRenderizar();
            }

            function toggleHijo(idHijo, idPadre, hermanos) {
                estado[idHijo] = !estado[idHijo];
                const todosCompletados = hermanos.every(h => estado[h.id]);
                estado[idPadre] = todosCompletados;
                guardarYRenderizar();
            }

            function guardarYRenderizar() {
                localStorage.setItem("progresoFisicaOficialApp2", JSON.stringify(estado));
                renderizarLista();
            }

            function actualizarProgresoPorTema() {
                let totalItems = 0;
                let completados = 0;

                const temasMostrados = data[temaActivo];
                
                temasMostrados.forEach(grupo => {
                    totalItems++; 
                    if (estado[grupo.id]) completados++;

                    grupo.children.forEach(hijo => {
                        totalItems++; 
                        if (estado[hijo.id]) completados++;
                    });
                });

                const porcentaje = totalItems === 0 ? 0 : Math.round((completados / totalItems) * 100);
                progressBar.style.width = porcentaje + '%';
                progressText.textContent = `${porcentaje}% Progreso del Tema ${temaActivo} (${completados}/${totalItems})`;
            }

            Object.values(data).forEach(temas => {
                temas.forEach(grupo => {
                    if (grupo.children.length > 0) {
                        const todosCompletados = grupo.children.every(h => estado[h.id]);
                        if (todosCompletados) estado[grupo.id] = true;
                    }
                });
            });
            
            renderizarLista();
        });
    </script>
</body>
</html>
